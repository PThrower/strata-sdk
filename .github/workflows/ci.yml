name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  action-dist-drift:
    runs-on: ubuntu-latest
    name: Action dist must match source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build SDK
        run: npm run build --workspace @strata-ai/sdk
      - name: Build action ncc bundle
        run: npm run build --workspace @strata-ai/action
      - name: Verify dist/ is up to date
        run: |
          if ! git diff --quiet packages/action/dist/; then
            echo "::error::packages/action/dist/ drifted from source — run 'npm run build --workspace @strata-ai/action' and commit"
            git diff packages/action/dist/ | head -50
            exit 1
          fi
