name: MCP Security
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  strata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PThrower/strata-mcp-check@v1
        with:
          strata_api_key: ${{ secrets.STRATA_API_KEY }}
          fail_on: critical            # critical | high | medium
          comment_on_pr: true
